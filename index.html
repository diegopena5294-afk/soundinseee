<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Sound in See
    </title>

    <!-- Bootstrap 5 -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body class="normal">

    <!-- CONTENEDOR PRINCIPAL -->

    <div class="container-fluid vh-100 d-flex flex-column justify-content-center align-items-center text-center">

        <!-- TITULO -->

        <h1 class="display-3 fw-bold mb-3">
            🎧 Sound in See
        </h1>

        <!-- SUBTITULO -->

        <p class="lead mb-4">
            Sistema inteligente de asistencia auditiva
        </p>

        <!-- ESTADO -->

        <div id="estado" class="estado-box shadow-lg">

            Esperando activación...

        </div>

        <!-- TEXTO VOZ -->

        <div id="textoVoz" class="texto-voz mt-4">

            ...

        </div>

        <!-- HISTORIAL -->

        <div id="historial" class="historial-box mt-4">

            <h4>
                🕘 Historial
            </h4>

        </div>

        <!-- BOTON -->

        <button id="btnStart" class="btn btn-light btn-lg mt-4 px-5">

      Activar Micrófono 

    </button>

        <!-- SELECTOR MODOS -->

        <div class="mt-4 w-50">

            <select id="modoSelector" class="form-select form-select-lg">

        <option value="casa">
          🏠 Casa
        </option>

        <option value="calle">
          🚶 Calle
        </option>

        <option value="escuela">
          🏫 Escuela
        </option>

        <option value="noche">
          🌙 Noche
        </option>

      </select>

        </div>

    </div>

    <!-- TensorFlow.js/Futura IA -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script> -->

    <!-- JAVASCRIPT -->

    <script src="app.js"></script>

</body>

</html>
